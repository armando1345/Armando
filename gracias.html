  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var params = new URLSearchParams(window.location.search);
      var isQuizSubmission = params.get("form") === "quiz";

      if (!isQuizSubmission) {
        try {
          isQuizSubmission = localStorage.getItem("armandefica_last_submission") === "quiz";
        } catch (error) {
          isQuizSubmission = false;
        }
      }

      if (!isQuizSubmission) {
        return;
      }

      document.body.classList.add("thanks-quiz-mode");

      var kicker = document.querySelector("[data-thanks-kicker]");
      var title = document.querySelector("[data-thanks-title]");
      var copy = document.querySelector("[data-thanks-copy]");

      if (kicker) {
        kicker.textContent = "Cuestionario completado";
      }
      if (title) {
        title.textContent = "Cuestionario enviado correctamente";
      }
      if (copy) {
        copy.textContent = "Gracias. Ya recibimos tus respuestas y pronto recibir\u00e1s la devoluci\u00f3n.";
      }

      try {
        localStorage.removeItem("armandefica_last_submission");
      } catch (error) {
        // No-op.
      }
    });
  </script>
